<!--
  ============================================================
  Card — Reusable content card partial
  ============================================================
  Copy and customise this structure wherever a card is needed.
  Apply class "card--hover" for interactive hover state.
  ============================================================
-->

<div class="card card--hover">

    <!-- Icon slot — replace emoji/SVG as needed -->
    <div class="card__icon" aria-hidden="true">
        ⚡
    </div>

    <!-- Title -->
    <h3 class="card__title">
        Card Title
    </h3>

    <!-- Body copy -->
    <p class="card__body">
        Short description of this feature, service, or benefit. Keep it concise and outcome-focused.
    </p>

    <!-- Optional footer — remove if not needed -->
    <div class="card__footer">
        <a href="#" class="btn btn--secondary btn--sm">Learn More</a>
    </div>

</div>
