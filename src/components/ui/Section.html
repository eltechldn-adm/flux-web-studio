<!--
  ============================================================
  Section — Reusable layout block partial
  ============================================================
  Wrap any page section in this structure.
  Grid class options:
    section__grid--2  (2 columns)
    section__grid--3  (3 columns, default for features)
    section__grid--4  (4 columns)
  ============================================================
-->

<section class="section">
    <div class="container">

        <!-- Section header (optional — remove if not needed) -->
        <div class="section__header">
            <span class="section__label">Section Label</span>
            <h2 class="section__title">Section Title Goes Here</h2>
            <p class="section__subtitle">
                Supporting subtitle text goes here. Keep this concise and focused on the benefit to the reader.
            </p>
        </div>

        <!-- Content grid — replace with card or feature-grid partials -->
        <div class="section__grid section__grid--3">

            <!-- Grid items go here -->

        </div>

    </div>
</section>
